<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>OBS Live Score Padel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Latar belakang wajib transparan untuk OBS */
        body {
            background-color: transparent; 
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden; 
        }

        /* Desain Lower Third Minimalis */
        .score-board {
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 10, 0.9);
            border-radius: 10px;
            padding: 10px 15px;
            width: max-content;
            border-left: 5px solid #76FF03; /* Aksen Hijau Live */
            box-shadow: 0px 4px 15px rgba(0,0,0,0.6);
        }

        .team-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 4px 0;
        }

        .team-name-container {
            display: flex;
            flex-direction: column; /* Nama menumpuk ke bawah */
            justify-content: center;
            width: 240px; /* Lebar tetap agar sejajar */
            gap: 4px; /* Jarak antar baris nama */
            min-height: 50px; /* Menjaga tinggi minimum jika single */
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .team-name {
            font-size: 13px; /* Diperkecil lagi agar rapi dalam 2 baris */
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1; /* Biar nama mengambil sisa ruang */
        }

        /* Indikator Serve untuk 4 Peserta */
        .serve-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: transparent;
            flex-shrink: 0; /* Biar tidak gepeng */
        }
        .serve-dot.active {
            background-color: #76FF03;
            box-shadow: 0 0 8px #76FF03;
        }

        .score-boxes {
            display: flex;
            gap: 8px;
        }

        .game-score {
            font-size: 22px;
            font-weight: 900;
            background: #333;
            color: white;
            padding: 2px 12px;
            border-radius: 6px;
            text-align: center;
            min-width: 20px;
        }

        .point-score {
            font-size: 22px;
            font-weight: 900;
            background: #76FF03;
            color: #000;
            padding: 2px 15px;
            border-radius: 6px;
            text-align: center;
            min-width: 35px;
        }

        .match-info {
            font-size: 11px;
            color: #aaa;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="score-board" id="score-widget">
        <div class="match-info" id="match-meta">MEMUAT KONEKSI...</div>
        
        <div class="team-row">
            <div class="team-name-container" id="players-a">
                <div class="player-row">
                    <div class="serve-dot"></div>
                    <div class="team-name">TIM A</div>
                </div>
            </div>
            <div class="score-boxes">
                <div id="sets-a" style="display: flex; gap: 8px;">
                    </div>
                <div class="point-score" id="point-a">-</div>
            </div>
        </div>

        <div class="team-row">
            <div class="team-name-container" id="players-b">
                <div class="player-row">
                    <div class="serve-dot"></div>
                    <div class="team-name">TIM B</div>
                </div>
            </div>
            <div class="score-boxes">
                <div id="sets-b" style="display: flex; gap: 8px;">
                    </div>
                <div class="point-score" id="point-b">-</div>
            </div>
        </div>
    </div>

    <script>
        // KREDENSIAL ASLI SUPABASE ANDA
        const SUPABASE_URL = 'https://gubcvxiupehbdpigrdct.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_k1y6fNI2opEXhwqKMbGYcA__2nD0yT6';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // AMBIL PARAMETER DARI URL (Contoh di OBS: overlay.html?id=pamorpadel&court=Valencia)
        const urlParams = new URLSearchParams(window.location.search);
        const TOURNAMENT_ID = urlParams.get('id') || 'vip';
        const COURT_NAME = urlParams.get('court'); 

        async function fetchLiveMatch() {
            try {
                let query = db.from('matches_pro')
                    .select('*')
                    .eq('tournament_id', TOURNAMENT_ID)
                    .eq('status', 'LIVE'); // Sesuai dengan status di wasit.html Anda

                // Filter by court jika dimasukkan di URL
                if (COURT_NAME) {
                    query = query.ilike('court_name', COURT_NAME);
                }

                let { data, error } = await query.order('created_at', {ascending: true}).limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    let m = data[0];
                    
                    // Update Meta Info
                    document.getElementById('match-meta').innerText = `SET ${m.current_set || 1} • ${m.court_name || ''}`;

                    // --- LOGIKA BARU: MENANGANI NAMA GANDA (TURUN KE BAWAH) & SERVE SPESIFIK 4 PESERTA ---
                    let server = m.server || '';

                    function renderTeamPlayers(teamString, containerId, isTeamA) {
                        const container = document.getElementById(containerId);
                        let html = '';
                        
                        // Default nama jika kosong
                        let defaultName = isTeamA ? 'TIM A' : 'TIM B';
                        let players = teamString ? [teamString] : [defaultName];

                        // Jika ada garis miring, pecah menjadi dua nama
                        if (teamString && teamString.includes('/')) {
                            players = teamString.split('/').map(p => p.trim());
                        }

                        // Buat Baris Pemain Dinamis (1 atau 2 Peserta)
                        players.forEach(playerName => {
                            // Cek apakah pemain ini yang sedang serve
                            let isServing = (playerName === server) || (isTeamA && server === 'a') || (!isTeamA && server === 'b');
                            let actClass = isServing ? 'active' : '';

                            html += `
                                <div class="player-row">
                                    <div class="serve-dot ${actClass}"></div>
                                    <div class="team-name">${playerName}</div>
                                </div>
                            `;
                        });

                        container.innerHTML = html;
                    }

                    // Eksekusi Render untuk Kedua Tim (Menangani 1-4 Peserta)
                    renderTeamPlayers(m.team_a, 'players-a', true);
                    renderTeamPlayers(m.team_b, 'players-b', false);
                    // --- SELESAI LOGIKA BARU ---

                    // Update Riwayat Skor Set (Otomatis berderet memanjang)
                    let currentSet = m.current_set || 1;
                    let htmlSetsA = '';
                    let htmlSetsB = '';
                    
                    for (let i = 1; i <= currentSet; i++) {
                        let scoreA = m[`set${i}_a`] || '0';
                        let scoreB = m[`set${i}_b`] || '0';
                        
                        // Beri efek redup untuk set yang sudah berlalu
                        let opClass = (i === currentSet) ? '' : 'style="opacity: 0.6;"';

                        htmlSetsA += `<div class="game-score" ${opClass}>${scoreA}</div>`;
                        htmlSetsB += `<div class="game-score" ${opClass}>${scoreB}</div>`;
                    }
                    
                    document.getElementById('sets-a').innerHTML = htmlSetsA;
                    document.getElementById('sets-b').innerHTML = htmlSetsB;

                    // Update Poin (15, 30, 40, AD)
                    document.getElementById('point-a').innerText = m.points_a || '0';
                    document.getElementById('point-b').innerText = m.points_b || '0';

                } else {
                    document.getElementById('match-meta').innerText = "TIDAK ADA MATCH LIVE";
                    document.getElementById('name-a').innerText = "-";
                    document.getElementById('name-b').innerText = "-";
                    document.getElementById('game-a').innerText = "0";
                    document.getElementById('game-b').innerText = "0";
                    document.getElementById('point-a').innerText = "0";
                    document.getElementById('point-b').innerText = "0";
                }
            } catch (err) {
                console.error("Gagal mengambil data overlay:", err);
            }
        }

        // SISTEM REAL-TIME
        function subscribeOBS() {
            db.channel('obs_live_score')
              .on('postgres_changes', { 
                  event: '*', 
                  schema: 'public', 
                  table: 'matches_pro',
                  filter: `tournament_id=eq.${TOURNAMENT_ID}`
              }, () => fetchLiveMatch())
              .subscribe();
        }

        // Eksekusi awal
        fetchLiveMatch();
        subscribeOBS();
    </script>
</body>
</html>
