name: Robot Pengacak Ryan

on:
  push:
    branches:
      - eksperimen-ryan

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Mengambil File Master
        uses: actions/checkout@v4

      - name: 2. Menyiapkan Mesin Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Menginstall Alat Terser
        run: npm install terser

      - name: 4. Membuat Skrip Pengeksekusi
        run: |
          cat << 'EOF' > run_obfuscator.js
          const fs = require('fs');
          const { minify } = require('terser');

          const files = ['control.html', 'daftar.html', 'index.html', 'overlay.html', 'tv.html', 'wasit.html'];

          async function processFiles() {
            for (let file of files) {
              if (fs.existsSync(file)) {
                let html = fs.readFileSync(file, 'utf8');
                let scriptRegex = /(<script(?![^>]*src=)[^>]*>)([\s\S]*?)(<\/script>)/gi;
                let replacements = [];
                let match;
                
                while ((match = scriptRegex.exec(html)) !== null) {
                  replacements.push({
                    full: match[0],
                    open: match[1],
                    code: match[2],
                    close: match[3]
                  });
                }

                for (let r of replacements) {
                  try {
                    let result = await minify(r.code, {
                      compress: { drop_console: true },
                      mangle: { keep_fnames: true }, // Menjaga nama fungsi agar tombol onclick tidak rusak
                      format: { comments: false }
                    });
                    if (result.code) {
                      html = html.replace(r.full, r.open + '\n' + result.code + '\n' + r.close);
                    }
                  } catch (e) {
                    console.error("Gagal compress JS di " + file, e);
                  }
                }

                fs.writeFileSync(file, html);
                console.log(`Berhasil memproses: ${file}`);
              }
            }
          }
          processFiles();
          EOF

      - name: 5. Mulai Menggiling Kode JS
        run: node run_obfuscator.js

      - name: 6. Membersihkan Mesin
        run: rm run_obfuscator.js

      - name: 7. Mengirim Hasil ke branch hasil-ryan
        run: |
          git config --global user.name "Robot Ryan"
          git config --global user.email "robot@matchlivepro.com"
          git checkout -B hasil-ryan
          git add .
          git commit -m "Auto-minify JS aman selesai" || echo "Tidak ada perubahan"
          git push -f origin hasil-ryan
